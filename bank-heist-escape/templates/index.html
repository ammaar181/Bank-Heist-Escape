<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Heist</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="landing-body">
    <div class="landing-bg"></div>

    <main class="landing-wrap">
        <section class="landing-panel">
            <div class="eyebrow">DIGITAL INFILTRATION // BANK VAULT OPERATION</div>

            <h1 class="hero-title">
                CYBER<br>HEIST
            </h1>

            <p class="hero-text">
                Break into the bank’s internal systems, exploit weak security, and push through each layer of defence until the vault opens.
            </p>

            <div class="hero-info-grid">
                <div class="info-card">
                    <span class="info-label">Mission</span>
                    <span class="info-value">Bank Breach</span>
                </div>
                <div class="info-card">
                    <span class="info-label">Mode</span>
                    <span class="info-value">Sequential Challenges</span>
                </div>
                <div class="info-card">
                    <span class="info-label">Support</span>
                    <span class="info-value">Inside Man</span>
                </div>
            </div>

            <a href="/game" class="btn-link">
                <button class="main-btn">Start Operation</button>
            </a>
        </section>
    </main>
</body>
</html>
